<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front-end Application</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f6d365, #fda085);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            width: 360px;
            border-radius: 14px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        /* Header text moved inside card */
        .header-text {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        .card img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 10px;
            color: #444;
        }

        p {
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }

        button {
            background-color: blue;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 6px;
            width: 100%;
        }

        button:hover {
            background-color: darkblue;
        }

        #response {
            margin-top: 15px;
            font-size: 14px;
            color: green;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header-text">
                Welcome to the Secure Front-End Portal
            </div>     
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="App Image">
            <h2>User Login</h2>
            <p>Please click the button below to continue.</p>      
            <button id="loginButton">Login</button>
    <p id="response"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
